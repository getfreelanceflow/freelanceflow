openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: FreelanceFlow AI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: jobs
    description: Freelance job operations
  - name: proposals
    description: AI proposal operations
  - name: savedJobs
    description: Saved jobs operations
  - name: dashboard
    description: Dashboard summary operations
  - name: openai
    description: OpenAI AI chat, image, and audio operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List freelance jobs
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: minBudget
          in: query
          schema:
            type: number
        - name: maxBudget
          in: query
          schema:
            type: number
        - name: platform
          in: query
          schema:
            type: string
        - name: postedWithin
          in: query
          schema:
            type: string
            enum: [24h, 7d, 30d, any]
        - name: jobType
          in: query
          schema:
            type: string
            enum: [remote, onsite, hybrid, any]
        - name: location
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /search:
    get:
      operationId: globalSearch
      tags: [jobs]
      summary: Global search across jobs, clients, invoices, proposals
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Grouped search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalSearchResults"

  /notifications:
    get:
      operationId: listNotifications
      tags: [dashboard]
      summary: List actionable notifications for the current user
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /proposals:
    get:
      operationId: listProposals
      tags: [proposals]
      summary: List user proposals
      responses:
        "200":
          description: List of proposals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Proposal"
    post:
      operationId: createProposal
      tags: [proposals]
      summary: Generate an AI proposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalInput"
      responses:
        "201":
          description: Created proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  /proposals/{id}:
    get:
      operationId: getProposal
      tags: [proposals]
      summary: Get a proposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProposal
      tags: [proposals]
      summary: Delete a proposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /saved-jobs:
    get:
      operationId: listSavedJobs
      tags: [savedJobs]
      summary: List saved jobs
      responses:
        "200":
          description: Saved jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedJob"
    post:
      operationId: saveJob
      tags: [savedJobs]
      summary: Save a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedJobInput"
      responses:
        "201":
          description: Saved job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedJob"

  /saved-jobs/{id}:
    delete:
      operationId: deleteSavedJob
      tags: [savedJobs]
      summary: Remove a saved job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-proposals:
    get:
      operationId: getRecentProposals
      tags: [dashboard]
      summary: Get recent proposals for activity feed
      responses:
        "200":
          description: Recent proposals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Proposal"

  /dashboard/top-jobs:
    get:
      operationId: getTopJobs
      tags: [dashboard]
      summary: Get top/featured job matches
      responses:
        "200":
          description: Top jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a message and get AI response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "201":
          description: AI response message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Job:
      type: object
      required: [id, title, description, category, budgetMin, budgetMax, skills, postedAt, platform, successScore]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        budgetMin:
          type: number
        budgetMax:
          type: number
        skills:
          type: array
          items:
            type: string
        postedAt:
          type: string
        platform:
          type: string
        successScore:
          type: number
        clientName:
          type: ["string", "null"]
        clientRating:
          type: ["number", "null"]
        jobType:
          type: string
        location:
          type: ["string", "null"]

    Proposal:
      type: object
      required: [id, jobTitle, content, status, createdAt]
      properties:
        id:
          type: integer
        jobId:
          type: ["integer", "null"]
        jobTitle:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [draft, sent, accepted, rejected]
        successProbability:
          type: ["number", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ProposalInput:
      type: object
      required: [jobTitle, jobDescription, mySkills]
      properties:
        jobId:
          type: integer
        jobTitle:
          type: string
        jobDescription:
          type: string
        mySkills:
          type: string
        budget:
          type: string
        tone:
          type: string

    SavedJob:
      type: object
      required: [id, jobId, savedAt]
      properties:
        id:
          type: integer
        jobId:
          type: integer
        savedAt:
          type: string
        job:
          $ref: "#/components/schemas/Job"

    SavedJobInput:
      type: object
      required: [jobId]
      properties:
        jobId:
          type: integer

    DashboardSummary:
      type: object
      required: [totalProposals, acceptedProposals, savedJobs, successRate, proposalsByStatus]
      properties:
        totalProposals:
          type: integer
        acceptedProposals:
          type: integer
        savedJobs:
          type: integer
        successRate:
          type: number
        proposalsByStatus:
          type: object
          properties:
            draft:
              type: integer
            sent:
              type: integer
            accepted:
              type: integer
            rejected:
              type: integer
          required: [draft, sent, accepted, rejected]

    OpenaiConversation:
      type: object
      required: [id, title, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    OpenaiConversationInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        systemPrompt:
          type: string

    OpenaiConversationWithMessages:
      type: object
      required: [id, title, createdAt, updatedAt, messages]
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"

    OpenaiMessage:
      type: object
      required: [id, conversationId, role, content, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        createdAt:
          type: string

    OpenaiMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string

    OpenaiError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    GlobalSearchResults:
      type: object
      required: [jobs, clients, invoices, proposals]
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/SearchHit"
        clients:
          type: array
          items:
            $ref: "#/components/schemas/SearchHit"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/SearchHit"
        proposals:
          type: array
          items:
            $ref: "#/components/schemas/SearchHit"

    SearchHit:
      type: object
      required: [id, title, href]
      properties:
        id:
          type: integer
        title:
          type: string
        subtitle:
          type: ["string", "null"]
        href:
          type: string

    Notification:
      type: object
      required: [id, kind, title, body, href, createdAt]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [invoice_overdue, invoice_due_soon, followup_due, job_match, welcome]
        title:
          type: string
        body:
          type: string
        href:
          type: string
        createdAt:
          type: string
